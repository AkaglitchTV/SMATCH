<style>
/* ── BASE ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
body { background:#020617; color:#f1f5f9; font-family:ui-sans-serif,system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }
#bg-layer { position:fixed; inset:0; z-index:0; background:linear-gradient(160deg,#0f1f3d 0%,#0c2340 25%,#1a3a5c 45%,#2d5a7a 60%,#1e3a52 75%,#0a1628 100%); }

/* ── ANIMATIONS ──────────────────────────────── */
@keyframes merge-flash { 0%{opacity:0;transform:scale(.92)} 60%{opacity:1;transform:scale(1.01)} 100%{opacity:1;transform:scale(1)} }
@keyframes dot-pulse   { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes slide-up    { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes comment-pop { from{opacity:0;transform:translateY(8px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes modal-appear { from{opacity:0;transform:scale(.93) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }

.merge-appear { animation:merge-flash .6s ease both; }
.merge-appear:nth-child(1){animation-delay:.05s}.merge-appear:nth-child(2){animation-delay:.12s}.merge-appear:nth-child(3){animation-delay:.19s}
.live-dot  { animation:dot-pulse 1.5s ease-in-out infinite; }
.slide-up  { animation:slide-up .3s ease both; }
.cmt-pop   { animation:comment-pop .3s ease both; }

/* ── CARD & GLASS ───────────────────────────── */
.card  { background:rgba(15,23,42,.75); border:1px solid rgba(30,41,59,.7); border-radius:20px; backdrop-filter:blur(16px); }
.card2 { background:rgba(5,8,20,.65);   border:1px solid rgba(30,41,59,.6); border-radius:14px; }

/* ── TABS ────────────────────────────────────── */
.tab-on  { background:rgba(34,211,238,.15); border-color:rgba(34,211,238,.5); color:#22d3ee; }
.tab-off { background:rgba(5,8,20,.5);      border-color:rgba(30,41,59,.5);   color:#64748b; }

/* ── ROADMAP ────────────────────────────────── */
.roadmap-step::before { content:''; position:absolute; left:20px; top:44px; bottom:-16px; width:2px; background:linear-gradient(to bottom,rgba(34,211,238,.4),rgba(34,211,238,0)); }
.roadmap-step:last-child::before { display:none; }

/* ── CHAT ────────────────────────────────────── */
.bubble-me   { background:linear-gradient(135deg,#0891b2,#1d4ed8); border-radius:18px 18px 4px 18px; }
.bubble-them { background:rgba(15,23,42,.95); border:1px solid rgba(30,41,59,.6); border-radius:18px 18px 18px 4px; }
.chat-scroll { scrollbar-width:thin; scrollbar-color:rgba(30,41,59,.6) transparent; }

/* ── STARS ───────────────────────────────────── */
.star-btn { font-size:1.35rem; cursor:pointer; color:#1e293b; transition:transform .15s,filter .15s; }
.star-btn.lit { color:#22d3ee; filter:drop-shadow(0 0 4px rgba(34,211,238,.7)); }
.star-btn:hover { transform:scale(1.25); }

/* ── BUDGET / COURSES ───────────────────────── */
.expense-row { animation:merge-flash .3s ease both; }
.mini-avatar { width:26px; height:26px; border-radius:50%; font-size:.65rem; font-weight:900; border:2px solid rgba(5,8,20,.9); cursor:pointer; transition:opacity .2s,border-color .2s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.mini-avatar.inactive { opacity:.28; }
.mini-avatar.active   { opacity:1; border-color:rgba(34,211,238,.55); }

/* ── MODAL ───────────────────────────────────── */
.modal-overlay { display:none; position:fixed; inset:0; z-index:9000; background:rgba(2,6,23,.82); backdrop-filter:blur(7px); align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-box { background:rgba(10,15,30,.97); border:1px solid rgba(34,211,238,.22); border-radius:24px; width:94%; max-width:460px; max-height:90vh; overflow-y:auto; box-shadow:0 40px 80px rgba(0,0,0,.7); animation:modal-appear .28s ease both; scrollbar-width:thin; }

/* ── MEMBER TOOLTIP ─────────────────────────── */
.member-wrap { position:relative; display:inline-flex; cursor:pointer; }
.member-tooltip { position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%) scale(.85); background:rgba(5,8,20,.96); border:1px solid rgba(34,211,238,.3); color:#22d3ee; font-size:.62rem; font-weight:700; white-space:nowrap; padding:4px 10px; border-radius:8px; pointer-events:none; opacity:0; transition:opacity .2s,transform .2s; z-index:50; }
.member-wrap:hover .member-tooltip { opacity:1; transform:translateX(-50%) scale(1); }

/* ── EDIT FIELD ─────────────────────────────── */
.edit-field { background:rgba(34,211,238,.05); border:1px solid rgba(34,211,238,.3); border-radius:8px; padding:5px 10px; color:#fff; width:100%; font-size:.8rem; outline:none; transition:border-color .2s; font-family:inherit; }
.edit-field:focus { border-color:#22d3ee; }

/* ── COMMENT TEXTAREA ────────────────────────── */
.cmt-ta { width:100%; background:rgba(5,8,20,.65); border:1px solid rgba(30,41,59,.6); border-radius:12px; padding:10px 14px; color:#e2e8f0; font-size:.78rem; resize:none; outline:none; transition:border-color .2s; font-family:inherit; }
.cmt-ta:focus { border-color:rgba(34,211,238,.5); }
.cmt-ta::placeholder { color:#334155; }

/* ── TOAST ───────────────────────────────────── */
#toast { position:fixed; bottom:22px; right:22px; z-index:9999; background:rgba(10,15,30,.97); border:1px solid rgba(34,211,238,.4); color:#22d3ee; font-size:.8rem; font-weight:700; padding:10px 18px; border-radius:14px; pointer-events:none; opacity:0; transform:translateY(10px); transition:all .28s ease; backdrop-filter:blur(12px); }
#toast.show { opacity:1; transform:translateY(0); }

/* ── MICRO-INTERACTIONS ──────────────────────── */
a, button { transition:filter .17s ease, transform .17s ease; }
button:hover:not(:disabled) { filter:brightness(1.12); }
button:active:not(:disabled), a:active { transform:scale(.97)!important; filter:brightness(.92)!important; }
button:disabled { opacity:.4; cursor:not-allowed; }
</style>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  LOAD ACTIVE TRIP — URL param wins, written to localStorage BEFORE TRIP assigned
// ═══════════════════════════════════════════════════════════════════════════
(function() {
  const urlParam = new URLSearchParams(window.location.search).get('trip');
  if (urlParam && window.SMATCH_TRIPS && window.SMATCH_TRIPS[urlParam]) {
    localStorage.setItem('snm_active_trip_id', urlParam);
  }
})();
const TRIP = smatchGetActiveTrip();
const isEte = TRIP.mode === 'ete';
const AC  = TRIP.accentColor;
const ACS = `rgba(34,211,238,`; // used inline

// ── Member data (combined hiver+ete pool) ──────────────────────────────
// ── Annuaire centralisé (depuis trip_data.js) ──────────────────────────
// Clone profond pour permettre l'override du pseudo de self sans toucher la source
const ALL_MEMBERS = JSON.parse(JSON.stringify(typeof window.smatchAllMembers === 'function' ? window.smatchAllMembers() : window.SMATCH_MEMBERS));
ALL_MEMBERS.R.name = localStorage.getItem('snm_pseudo') || ALL_MEMBERS.R.name;
// MEMBER_NAMES = noms de tous les membres connus (base + fusionnés)
const MEMBER_NAMES = {};
Object.keys(ALL_MEMBERS).forEach(k => { MEMBER_NAMES[k] = ALL_MEMBERS[k].name; });
MEMBER_NAMES.R = 'RiderDu74';
const STAR_LBLS = ['','Bof 😐','Passable 🤏','Bien 👍','Super ! 🔥','Légendaire ! 🤩'];
const MEMBERS_SHOP = TRIP.memberKeys.map(k => ({
  key:k, label:(ALL_MEMBERS[k]?.name?.[0]) || (k.length===1?k:'?'),
  color: ALL_MEMBERS[k]?.color || 'from-slate-600 to-slate-800',
  text:  ALL_MEMBERS[k]?.tc    || 'text-white',
}));

// ── Runtime state ──────────────────────────────────────────────────────
let currentMember = null, userRating = 0, editMode = false;
let expenses = [];
let shopItems = TRIP.shopItems.map(i => ({...i}));
let shopIdCounter = shopItems.length + 1;
let activeTab = 'roadmap';

// ═══════════════════════════════════════════════════════════════════════════
//  INIT PAGE
// ═══════════════════════════════════════════════════════════════════════════
function initPage() {
  // Apply member name from localStorage (updated by navProfilSave)
  ALL_MEMBERS.R.name = localStorage.getItem('snm_pseudo') || 'RiderDu74';
  MEMBER_NAMES.R = ALL_MEMBERS.R.name;

  document.title = `SnowMatch — ${TRIP.name} ❄️`;
  document.getElementById('footer-brand').textContent = TRIP.mode === 'ete' ? 'SunMatch' : 'SnowMatch';

  renderHeader();
  renderRoadmap();
  renderStation();
  renderBudget();
  renderCourses();
  renderArchives();
  renderMembers();
  renderChat();
}

// ═══════════════════════════════════════════════════════════════════════════
//  CREW HEADER
// ═══════════════════════════════════════════════════════════════════════════
function renderHeader() {
  const memberKeys = TRIP.memberKeys;
  const colors = ['from-cyan-400 to-blue-600','from-violet-500 to-purple-700','from-orange-400 to-red-600','from-emerald-400 to-teal-600','from-rose-400 to-pink-600'];
  const avatars = memberKeys.map((k,i) => `<div class="w-11 h-11 rounded-full bg-gradient-to-br ${colors[i]||colors[0]} flex items-center justify-center text-slate-950 font-black border-2 border-slate-900 text-sm" style="z-index:${40-i*10};">${avatarLetter(k, ALL_MEMBERS[k])}</div>`).join('');
  const isPast = new Date(TRIP.dateEnd) < new Date();
  document.getElementById('crew-header').innerHTML = `
    <div class="flex flex-col md:flex-row items-center gap-5">
      <div class="flex -space-x-3 flex-shrink-0">${avatars}</div>
      <div class="flex-grow text-center md:text-left">
        <div class="flex items-center justify-center md:justify-start gap-2 mb-1">
          <i class="fa-solid ${isPast ? 'fa-box-archive text-violet-400' : 'fa-bolt text-cyan-400'} text-xs"></i>
          <span class="text-xs font-bold uppercase tracking-wider" style="color:${AC};">${isPast ? '📸 Souvenir archivé' : 'Crew actif ✓'}</span>
        </div>
        <h2 class="text-2xl font-extrabold text-white">${TRIP.name} ${TRIP.emoji}</h2>
        <p class="text-slate-400 text-sm mt-0.5">${TRIP.members} membres · ${TRIP.spot} · ${formatDateRange(TRIP.dateStart, TRIP.dateEnd)}</p>
        ${!isPast ? `<button onclick="openEditCrew()" class="mt-2 inline-flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-full transition-all" style="background:${AC}14;border:1px solid ${AC}33;color:${AC};" onmouseenter="this.style.background='${AC}22'" onmouseleave="this.style.background='${AC}14'"><i class="fa-solid fa-pen"></i> Modifier le crew</button>` : ''}
      </div>
      <div class="flex gap-4 flex-shrink-0 text-center">
        <div><div class="text-xl font-black" style="color:${AC};">${TRIP.members}</div><div class="text-xs text-slate-500">Membres</div></div>
        <div class="w-px bg-slate-800"></div>
        <div><div class="text-xl font-black text-emerald-400">${daysBetween(TRIP.dateStart,TRIP.dateEnd)}j</div><div class="text-xs text-slate-500">Séjour</div></div>
        <div class="w-px bg-slate-800"></div>
        <div><div class="text-xl font-black text-violet-400">87%</div><div class="text-xs text-slate-500">Compat.</div></div>
      </div>
    </div>`;
}

function formatDateRange(s,e) {
  const opts = {day:'numeric',month:'short',year:'numeric'};
  return new Date(s).toLocaleDateString('fr-FR',opts) + ' – ' + new Date(e).toLocaleDateString('fr-FR',opts);
}
function daysBetween(s,e) { return Math.round((new Date(e)-new Date(s))/(1000*60*60*24)); }

function showTab(tab) {
  activeTab = tab;
  const tabs = ['roadmap','station','budget','courses','archives','log'];
  tabs.forEach(t => {
    const p = document.getElementById('panel-'+t);
    if (p) p.style.display = (t === tab) ? '' : 'none';
  });
  // Update tab buttons
  const btns = document.getElementById('tab-bar').querySelectorAll('button');
  btns.forEach((b,i) => {
    b.className = (tabs[i]===tab ? 'tab-on' : 'tab-off') + ' text-xs font-bold px-4 py-2 rounded-full border transition-all';
  });
  if (tab==='courses') renderCourses();
  if (tab==='archives') renderArchives();
  if (tab==='log') renderLog();
}

function saveRoadmapStep() {
  const date = document.getElementById('step-date').value;
  const title = document.getElementById('step-title').value.trim();
  const sub = document.getElementById('step-sub').value.trim();
  if (!title) { document.getElementById('step-title').style.borderColor = '#ef4444'; return; }
  const icons = ['fa-flag','fa-mountain','fa-utensils','fa-bed','fa-champagne-glasses','fa-person-skiing','fa-car'];
  TRIP.roadmap.push({ date: date || TRIP.dateStart, title, sub, badge: 'Étape', icon: icons[TRIP.roadmap.length % icons.length] });
  // Trie par date
  TRIP.roadmap.sort((a,b) => new Date(a.date) - new Date(b.date));
  _persistRoadmap();
  if (typeof dashAddLog === 'function') dashAddLog('🗺️ Roadmap', 'Étape ajoutée : "' + title + '"');
  document.getElementById('add-step-modal').remove();
  renderRoadmap();
  if (typeof showToast === 'function') showToast('✅ Étape ajoutée à la roadmap');
}

function dashDeleteRoadmapStep(i) {
  const step = TRIP.roadmap[i];
  if (!step) return;
  TRIP.roadmap.splice(i, 1);
  _persistRoadmap();
  if (typeof dashAddLog === 'function') dashAddLog('🗺️ Roadmap', 'Étape retirée : "' + step.title + '"');
  renderRoadmap();
  if (typeof showToast === 'function') showToast('Étape retirée');
}

function _persistRoadmap() {
  try {
    const fresh = JSON.parse(localStorage.getItem('snm_fresh_trips') || '{}');
    if (fresh[TRIP.id]) { fresh[TRIP.id].roadmap = TRIP.roadmap; localStorage.setItem('snm_fresh_trips', JSON.stringify(fresh)); }
    else {
      const ov = JSON.parse(localStorage.getItem('snm_trip_overrides') || '{}');
      ov[TRIP.id] = ov[TRIP.id] || {};
      ov[TRIP.id].roadmap = TRIP.roadmap;
      localStorage.setItem('snm_trip_overrides', JSON.stringify(ov));
    }
  } catch(e) {}
}

function toggleAddExpense() {
  const f = document.getElementById('expense-form');
  const hidden = f.classList.contains('hidden');
  f.classList.toggle('hidden', !hidden);
  if (!f.classList.contains('hidden')) { f.classList.remove('slide-up'); void f.offsetWidth; f.classList.add('slide-up'); }
}
function addExpense() {
  const title=document.getElementById('exp-title').value.trim();
  const amount=parseFloat(document.getElementById('exp-amount').value);
  const payer=document.getElementById('exp-payer').value;
  const parts=[...document.querySelectorAll('.exp-part-check:checked')].map(c=>c.value);
  if(!title||!amount||!parts.length){showToast('⚠️ Remplis tous les champs !');return;}
  expenses.push({title,amount,payer,parts,id:Date.now()});
  document.getElementById('exp-title').value='';document.getElementById('exp-amount').value='';
  document.getElementById('expense-form').classList.add('hidden');
  renderExpenses();renderBalances();updateBudgetTotal();showToast('✓ Dépense ajoutée');
}
function removeExpense(id){expenses=expenses.filter(e=>e.id!==id);renderExpenses();renderBalances();updateBudgetTotal();}
function renderExpenses(){
  const el=document.getElementById('expense-list');
  if(!el)return;
  el.innerHTML=expenses.map(e=>`<div class="expense-row flex items-center justify-between card2 px-4 py-3">
    <div><div class="text-sm font-semibold text-white">${e.title}</div><div class="text-xs text-slate-500">payé par <span style="color:#22d3ee;">${MEMBER_NAMES[e.payer]||e.payer}</span> · ${e.parts.length} pers.</div></div>
    <div class="flex items-center gap-3"><span class="text-sm font-bold text-white">${e.amount.toFixed(2)}€</span><button onclick="removeExpense(${e.id})" class="text-slate-600 hover:text-red-400 transition-colors text-xs" aria-label="Supprimer"><i class="fa-solid fa-trash"></i></button></div>
  </div>`).join('')||'<p class="text-xs text-slate-500 italic">Aucune dépense ajoutée.</p>';
}
function renderBalances(){
  const bal={};TRIP.memberKeys.forEach(k=>bal[k]=0);
  expenses.forEach(e=>{const s=e.amount/e.parts.length;bal[e.payer]+=e.amount;e.parts.forEach(p=>bal[p]-=s);});
  const d=Object.entries(bal).filter(([,v])=>v<-.01).sort((a,b)=>a[1]-b[1]);
  const c=Object.entries(bal).filter(([,v])=>v>.01).sort((a,b)=>b[1]-a[1]);
  const txns=[];let di=0,ci=0;
  const da=d.map(([k,v])=>[k,Math.abs(v)]),ca=c.map(([k,v])=>[k,v]);
  while(di<da.length&&ci<ca.length){const a=Math.min(da[di][1],ca[ci][1]);txns.push({from:da[di][0],to:ca[ci][0],amt:a});da[di][1]-=a;ca[ci][1]-=a;if(da[di][1]<.01)di++;if(ca[ci][1]<.01)ci++;}
  const el=document.getElementById('balance-list');if(!el)return;
  if(!txns.length){el.innerHTML='<p class="text-xs text-slate-500 italic">Tout le monde est à égalité ✓</p>';return;}
  el.innerHTML=txns.map(t=>`<div class="flex items-center justify-between card2 px-4 py-2.5 mb-1">
    <div class="flex items-center gap-2"><span class="text-xs font-semibold text-red-400">${MEMBER_NAMES[t.from]||t.from}</span><i class="fa-solid fa-arrow-right text-slate-600 text-xs"></i><span class="text-xs font-semibold text-emerald-400">${MEMBER_NAMES[t.to]||t.to}</span></div>
    <span class="text-sm font-black text-white">${t.amt.toFixed(2)}€</span>
  </div>`).join('');
}
function updateBudgetTotal(){
  const parsed=parseInt(TRIP.budget.label);
  const base=isNaN(parsed)?579:parsed;
  const extra=expenses.filter(e=>e.parts.includes('R')).reduce((s,e)=>s+e.amount/e.parts.length,0);
  const el=document.getElementById('budget-total');
  if(el)el.textContent=`${(base+extra).toFixed(0)}€`;
}

      <span id="shop-my-total" class="text-lg font-black text-cyan-400">0.00€</span>
    </div>`;

}

function toggleShopForm(){
  const f=document.getElementById('shop-form'),btn=document.getElementById('shop-add-btn');
  const hidden=f.classList.contains('hidden');
  f.classList.toggle('hidden',!hidden);
  if(!f.classList.contains('hidden')){f.classList.remove('slide-up');void f.offsetWidth;f.classList.add('slide-up');document.getElementById('shop-title').focus();}
  btn.innerHTML=hidden?'<i class="fa-solid fa-xmark text-xs"></i> Fermer':'<i class="fa-solid fa-plus text-xs"></i> Ajouter';
}
function addShopItem(){
  const name=document.getElementById('shop-title').value.trim();
  const price=parseFloat(document.getElementById('shop-price').value);
  const payer=document.getElementById('shop-payer').value;
  const parts=[...document.querySelectorAll('.shop-part-check:checked')].map(c=>c.value);
  if(!name||!price||!parts.length){showToast('⚠️ Remplis tous les champs !');return;}
  shopItems.push({id:shopIdCounter++,name,price,payer,active:parts});
  document.getElementById('shop-title').value='';document.getElementById('shop-price').value='';
  document.querySelectorAll('.shop-part-check').forEach(c=>c.checked=true);
  toggleShopForm();renderShopList();syncShopToBudget();showToast('✓ Article ajouté 🛒');
}
function renderShopList(){
  const el=document.getElementById('shop-list');if(!el)return;
  el.innerHTML=shopItems.map(item=>{
    const ac=item.active.length;
    const myShare=item.active.includes('R')?(item.price/Math.max(ac,1)).toFixed(2):'0.00';
    const payerName=MEMBER_NAMES[item.payer]||item.payer||'';
    const avs=MEMBERS_SHOP.map(m=>`<div class="mini-avatar bg-gradient-to-br ${m.color} ${m.text} ${item.active.includes(m.key)?'active':'inactive'}" title="${MEMBER_NAMES[m.key]||m.key}" onclick="toggleShopMember(${item.id},'${m.key}')">${m.label}</div>`).join('');
    return `<div class="expense-row flex items-center justify-between card2 px-4 py-3 gap-3">
      <div class="flex-grow min-w-0">
        <div class="text-sm font-semibold text-white truncate">${item.name}</div>
        <div class="text-xs text-slate-500 mt-0.5">payé par <span style="color:#22d3ee;">${payerName}</span> · ${ac} participant${ac>1?'s':''}</div>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <div class="flex gap-0.5">${avs}</div>
        <div class="text-right"><div class="text-sm font-bold text-white">${item.price.toFixed(2)}€</div><div class="text-xs text-cyan-400">Ta part : ${myShare}€</div></div>
        <button onclick="removeShopItem(${item.id})" class="text-slate-600 hover:text-red-400 transition-colors text-xs ml-1" aria-label="Supprimer"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>`;
  }).join('')||'<p class="text-xs text-slate-500 italic py-2">Liste vide !</p>';
  updateShopTotal();
}
function toggleShopMember(id,k){const i=shopItems.find(x=>x.id===id);if(!i)return;const idx=i.active.indexOf(k);if(idx===-1)i.active.push(k);else i.active.splice(idx,1);renderShopList();syncShopToBudget();}
function removeShopItem(id){shopItems=shopItems.filter(i=>i.id!==id);renderShopList();syncShopToBudget();}
function updateShopTotal(){const t=shopItems.filter(i=>i.active.includes('R')).reduce((s,i)=>s+i.price/Math.max(i.active.length,1),0);const el=document.getElementById('shop-my-total');if(el)el.textContent=t.toFixed(2)+'€';}
function syncShopToBudget(){
  const tot=shopItems.reduce((s,i)=>s+i.price,0);
  const idx=expenses.findIndex(e=>e.title==='🛒 Courses collectives');
  if(tot<.01){if(idx!==-1)expenses.splice(idx,1);}
  else{const entry={title:'🛒 Courses collectives',amount:tot,payer:'R',parts:TRIP.memberKeys,id:idx!==-1?expenses[idx].id:Date.now()};if(idx!==-1)expenses[idx]=entry;else expenses.push(entry);}
  renderExpenses();renderBalances();updateBudgetTotal();
}

      <i class="fa-solid ${r.icon} text-sm flex-shrink-0" style="color:rgba(34,211,238,.7);width:20px;text-align:center;"></i>
      <div class="flex-grow min-w-0">

          <p class="text-xs text-slate-500 mt-0.5">${isPast ? 'Trip archivé · ' + formatDateRange(TRIP.dateStart,TRIP.dateEnd) : 'Étapes passées de ce trip'}</p>
        </div>

      ${isPast ? '<span class="text-xs px-2.5 py-0.5 rounded-full font-bold flex-shrink-0" style="background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.28);color:#a78bfa;">📸 Archivé</span>' : ''}

    </div>`;

function handleArchivePhotos(tripId, input, fromModal=false){
  if(!input.files||!input.files.length)return;
  const stored=JSON.parse(localStorage.getItem('snm_photos_'+tripId)||'[]');
  const count=input.files.length;
  let processed=0;
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      stored.push(ev.target.result);
      processed++;
      if(processed===count){
        localStorage.setItem('snm_photos_'+tripId,JSON.stringify(stored));
        showToast(`📸 ${count} photo${count>1?'s':''} ajoutée${count>1?'s':''} !`);
        if(fromModal) openPhotosModal(tripId);
      }
    };
    reader.readAsDataURL(file);
  });
}

function recreerTrip(tripId){
  const trip=SMATCH_TRIPS[tripId];if(!trip)return;
  localStorage.setItem('snm_mode',trip.mode);
  localStorage.setItem('snm_recree_trip_id',tripId);
  localStorage.setItem('snm_recree_spot',trip.spot);
  showToast(`🔄 Trip "${trip.name}" prêt à recréer…`);
  setTimeout(()=>window.location.href='recherche.html?recree=1',1100);
}

function saveEditCrew() {
  const newName  = document.getElementById('edit-name').value.trim();
  const newSpot  = document.getElementById('edit-spot').value.trim();
  const newStart = document.getElementById('edit-start').value;
  const newEnd   = document.getElementById('edit-end').value;
  const changes = [];
  if (newName && newName !== TRIP.name)        { changes.push(`Nom : "${TRIP.name}" → "${newName}"`); TRIP.name = newName; }
  if (newSpot && newSpot !== TRIP.spot)        { changes.push(`Lieu : "${TRIP.spot}" → "${newSpot}"`); TRIP.spot = newSpot; if (TRIP.station) TRIP.station.title = newSpot; }
  if (newStart && newStart !== TRIP.dateStart) { changes.push(`Départ : ${TRIP.dateStart||'—'} → ${newStart}`); TRIP.dateStart = newStart; }
  if (newEnd && newEnd !== TRIP.dateEnd)       { changes.push(`Retour : ${TRIP.dateEnd||'—'} → ${newEnd}`); TRIP.dateEnd = newEnd; }

  if (!changes.length) { document.getElementById('edit-crew-modal').remove(); return; }

  // Persiste dans le trip (fresh_trips) + l'entrée dashboard
  _persistTripEdits();
  changes.forEach(c => dashAddLog('✏️ Modification', c));

  document.getElementById('edit-crew-modal').remove();
  renderHeader();
  if (typeof showToast === 'function') showToast('✅ Crew mis à jour');
}

function _persistTripEdits() {
  // Met à jour snm_fresh_trips si c'est un crew créé, sinon stocke un override
  try {
    const fresh = JSON.parse(localStorage.getItem('snm_fresh_trips') || '{}');
    if (fresh[TRIP.id]) {
      fresh[TRIP.id].name = TRIP.name; fresh[TRIP.id].spot = TRIP.spot;
      fresh[TRIP.id].dateStart = TRIP.dateStart; fresh[TRIP.id].dateEnd = TRIP.dateEnd;
      if (fresh[TRIP.id].station) fresh[TRIP.id].station.title = TRIP.spot;
      localStorage.setItem('snm_fresh_trips', JSON.stringify(fresh));
    } else {
      // Override pour les trips officiels (Chamonix, etc.)
      const ov = JSON.parse(localStorage.getItem('snm_trip_overrides') || '{}');
      ov[TRIP.id] = { name: TRIP.name, spot: TRIP.spot, dateStart: TRIP.dateStart, dateEnd: TRIP.dateEnd };
      localStorage.setItem('snm_trip_overrides', JSON.stringify(ov));
    }
  } catch(e) {}
  // Met à jour l'entrée dans snm_dashboards (nom, spot, dateEnd)
  try {
    const dbs = JSON.parse(localStorage.getItem('snm_dashboards') || '[]');
    const d = dbs.find(x => x.id === TRIP.id);
    if (d) { d.name = TRIP.name; d.spot = TRIP.spot; d.dateEnd = TRIP.dateEnd; localStorage.setItem('snm_dashboards', JSON.stringify(dbs)); }
  } catch(e) {}
}

function renderLog() {
  const log = dashGetLog();
  const ago = (ts) => {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'à l\'instant';
    if (s < 3600) return 'il y a ' + Math.floor(s/60) + ' min';
    if (s < 86400) return 'il y a ' + Math.floor(s/3600) + ' h';
    return new Date(ts).toLocaleDateString('fr-FR', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
  };
  const rows = log.map(l => `
    <div style="display:flex;gap:.8rem;padding:.8rem 0;border-bottom:1px solid rgba(30,41,59,.5);">
      <div style="width:34px;height:34px;border-radius:10px;background:${AC}14;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;">${l.action.split(' ')[0]||'📝'}</div>
      <div style="flex-grow:1;min-width:0;">
        <div style="font-size:.82rem;color:#e2e8f0;font-weight:600;">${l.action.replace(/^\S+\s/,'')} <span style="color:#64748b;font-weight:400;">par ${l.who}</span></div>
        ${l.detail?`<div style="font-size:.72rem;color:#94a3b8;margin-top:.15rem;">${l.detail}</div>`:''}
        <div style="font-size:.62rem;color:#475569;margin-top:.2rem;">${ago(l.time)}</div>
      </div>
    </div>`).join('');
  document.getElementById('panel-log').innerHTML = `
    <h3 class="font-bold text-white mb-4 flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left" style="color:${AC};"></i>Journal du crew</h3>
    ${log.length ? rows : `<div class="text-center py-10"><div class="text-4xl mb-3">📋</div><p class="text-white font-semibold text-sm mb-1">Aucune activité enregistrée</p><p class="text-slate-400 text-xs">Les modifications du crew (nom, dates, lieu, membres…) apparaîtront ici.</p></div>`}`;
}

function dashLeaveCrew() {
  const existing = document.getElementById('leave-crew-modal');
  if (existing) existing.remove();
  const isEteMode = (typeof TRIP !== 'undefined' && TRIP.mode === 'ete');
  const AC = isEteMode ? '#fbbf24' : '#22d3ee';
  const modal = document.createElement('div');
  modal.id = 'leave-crew-modal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:20000;background:rgba(2,6,23,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;';
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  modal.innerHTML = `
    <div style="background:rgba(10,15,30,.98);border:1px solid rgba(239,68,68,.3);border-radius:22px;width:92%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,.7);overflow:hidden;animation:merge-flash .3s ease both;">
      <div style="padding:1.4rem 1.4rem 1rem;text-align:center;">
        <div style="font-size:2.8rem;margin-bottom:.6rem;">🚪</div>
        <div style="font-size:1.05rem;font-weight:800;color:#fff;margin-bottom:.5rem;">Quitter ${TRIP.name} ?</div>
        <div style="font-size:.8rem;color:#94a3b8;line-height:1.5;">Tu ne verras plus ce dashboard ni les messages du crew. Tu pourras être réinvité par un membre via un lien de partage.</div>
      </div>
      <div style="padding:0 1.4rem 1.4rem;display:flex;gap:.6rem;">
        <button onclick="document.getElementById('leave-crew-modal').remove()" style="flex:1;background:rgba(30,41,59,.65);border:1px solid rgba(71,85,105,.4);color:#94a3b8;font-weight:700;font-size:.82rem;padding:.7rem;border-radius:12px;cursor:pointer;transition:all .15s;" onmouseenter="this.style.background='rgba(30,41,59,.9)'" onmouseleave="this.style.background='rgba(30,41,59,.65)'">Annuler</button>
        <button onclick="confirmLeaveCrew()" style="flex:1;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-weight:800;font-size:.82rem;padding:.7rem;border-radius:12px;border:none;cursor:pointer;transition:opacity .15s;" onmouseenter="this.style.opacity='.85'" onmouseleave="this.style.opacity='1'"><i class="fa-solid fa-right-from-bracket"></i> Quitter</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function confirmLeaveCrew() {
  const tripId = TRIP.id;
  // Journalise le départ avant de partir
  if (typeof dashAddLog === 'function') dashAddLog('🚪 Départ', (localStorage.getItem('snm_pseudo')||'RiderDu74') + ' a quitté le crew');
  // Retire le crew de la liste des dashboards
  let dashboards = JSON.parse(localStorage.getItem('snm_dashboards') || '[]');
  dashboards = dashboards.filter(d => d.id !== tripId);
  localStorage.setItem('snm_dashboards', JSON.stringify(dashboards));
  localStorage.removeItem('snm_active_trip_id');
  showToast('🚪 Tu as quitté ' + TRIP.name);
  setTimeout(() => { window.location.href = 'accueil.html'; }, 1100);
}

document.addEventListener('keydown', e => { if(e.key==='Escape'){closeProfile();closePayModal();document.getElementById('photos-modal').classList.remove('open');}});
</script>
<script src="nav.js"></script>
</body>
